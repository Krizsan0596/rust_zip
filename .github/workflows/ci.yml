name: Rust CI

env:
  CARGO_TERM_COLOR: always

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 0 * * 0'
permissions:
    contents: read

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Cargo Audit
        uses: actions-rust-lang/audit@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-targets --all-features

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate HTML coverage report
        run: cargo llvm-cov --all-features --html --output-dir ./coverage-report --fail-under-lines 70
      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-coverage-report
          path: ./coverage-report
          retention-days: 7

  flamegraph:
    name: Flamegraph Profiling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install flamegraph
        uses: taiki-e/install-action@v2
        with:
          tool: flamegraph

      - name: Configure kernel parameters for perf
        run: |
          sudo sysctl -w kernel.perf_event_paranoid=-1
          sudo sysctl -w kernel.kptr_restrict=0

      - name: Generate Flamegraphs
        env:
          CARGO_PROFILE_RELEASE_DEBUG: "true"
          RUSTFLAGS: "--cfg no_inline"
        run: |
          dd if=/dev/urandom of=dummy.txt bs=1M count=100
          cargo flamegraph --release --bin rust_zip -o flamegraph_compression.svg -- -c -o dummy.zip dummy.txt
          cargo flamegraph --release --bin rust_zip -o flamegraph_decompression.svg -- -x -o decompressed.txt dummy.zip

      - name: Upload Flamegraph Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flamegraph
          path: |
            flamegraph_compression.svg
            flamegraph_decompression.svg

